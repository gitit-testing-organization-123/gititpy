<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ wiki_title }} - {{ page_title }}</title>
    <meta name="robots" content="{{ meta_robots }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" media="screen">
    <link href="{{ static_url }}wiki/css/highlighting.css" rel="stylesheet" media="screen" type="text/css">
    <link href="{{ static_url }}wiki/css/gititpy.css" rel="stylesheet" media="screen" type="text/css">
    <link href="{{ static_url }}wiki/css/custom.css" rel="stylesheet" media="screen" type="text/css">
    <link href="{{ static_url }}wiki/css/print.css" rel="stylesheet" media="print" type="text/css">
  </head>
  <body class="bg-body min-vh-100 d-flex align-items-center justify-content-center">
    <main class="text-center px-3">
      <p class="h2 text-secondary mb-2">404</p>
      <h1 class="h3 mb-3">Page not found</h1>
      <p class="text-secondary mb-4">The page may have moved or may not exist.</p>
      <p class="mb-0">
        <a class="btn btn-primary" href="{{ front_url }}">Front page</a> 
        <a class="btn btn-primary" href="{{ search_url }}">Search</a>
      </p>
    </main>
  </body>
</html>
