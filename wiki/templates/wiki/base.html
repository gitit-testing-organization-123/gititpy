<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ wiki_title }} - {{ page_title }}</title>
    {% if meta_robots %}
    <meta name="robots" content="{{ meta_robots }}">
    {% endif %}
    {% if canonical_url %}
    <link rel="canonical" href="{{ canonical_url }}">
    {% endif %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" media="screen">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" media="screen">
    <link href="{{ static_url }}wiki/css/highlighting.css" rel="stylesheet" media="screen" type="text/css">
    <link href="{{ static_url }}wiki/css/gititpy.css" rel="stylesheet" media="screen" type="text/css">
    <link href="{{ static_url }}wiki/css/custom.css" rel="stylesheet" media="screen" type="text/css">
    <link href="{{ static_url }}wiki/css/print.css" rel="stylesheet" media="print" type="text/css">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)']],
          displayMath: [['\\[', '\\]']],
          processEscapes: true
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        }
      };
    </script>
    <script defer src="{{ mathjax_url }}"></script>
  </head>
  <body class="bg-body-tertiary">
    <div id="doc3" class="container-fluid py-3">
      <div class="row g-3 align-items-start">
        <aside id="sidebar" class="col-12 col-lg-3 col-xl-2 order-1">
          {% block sidebar %}
            {% include "wiki/sidebar.html" %}
          {% endblock %}
        </aside>
        <main id="yui-main" class="col-12 col-lg-9 col-xl-10 order-2">
          <div id="maincol">
          <div id="userbox"></div>
          {% block tabs %}{% endblock %}
          <div id="content" class="wiki-content bg-body border rounded-bottom rounded-end p-3 p-md-4 shadow-sm">
            {% block content %}{% endblock %}
          </div>
          <div id="footer"></div>
        </div>
        </main>
      </div>
    </div>
  </body>
</html>
