{% extends "wiki/base.html" %}

{% block content %}
  <h1 class="pageTitle">All pages</h1>
  <div class="index">
    <ul>
      {% for page in pages %}
        <li class="page"><i class="bi bi-file-earmark-text" aria-hidden="true"></i><a href="{{ page.href }}">{{ page.label }}</a></li>
      {% else %}
        <li>No pages yet.</li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
