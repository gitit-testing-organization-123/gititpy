{% extends "wiki/base.html" %}

{% block tabs %}
  {% include "wiki/tabs.html" with active_tab="view" %}
{% endblock %}

{% block content %}
  <h1 class="pageTitle">{{ page_title }}</h1>
  {% if revision %}
    <h2 class="revision">Revision {{ revision }}</h2>
  {% endif %}
  {{ content_html|safe }}
{% endblock %}
