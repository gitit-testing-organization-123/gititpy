{% extends "wiki/base.html" %}

{% block content %}
  <h1 class="pageTitle">Search</h1>
  <form id="search-page-form" class="mb-3" action="{{ search_url }}" method="get">
    <div class="search-box input-group">
      <input id="search-page-input" class="form-control" type="search" name="q" value="{{ query }}" autocomplete="off" autofocus>
      <input class="btn btn-primary" type="submit" value="Search">
    </div>
  </form>
  <p id="search-status" class="search-status"></p>
  <div id="search-results"></div>
  <script>
    window.GititPySearchIndex = "{{ search_index_url }}";
  </script>
  <script defer src="{{ static_url }}wiki/js/search.js"></script>
{% endblock %}
