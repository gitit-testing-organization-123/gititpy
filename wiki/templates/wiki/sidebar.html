<div id="logo">
  <a href="{{ front_url }}"><img src="{{ static_url }}wiki/img/logo.png" alt="{{ wiki_title }}"></a>
</div>
<div class="sitenav">
  <fieldset>
    <legend>Site</legend>
    <ul>
      <li><a href="{{ front_url }}">Front page</a></li>
      <li><a href="{{ all_pages_url }}">All pages</a></li>
      <li><a href="{{ help_url }}">Help</a></li>
    </ul>
    <form id="searchform" action="{{ search_url }}" method="get">
      <input class="search_term" type="text" name="q" value="" placeholder="">
      <input type="submit" value="Search">
    </form>
  </fieldset>
  <fieldset>
    <legend>Development</legend>
    <ul>
      {% for tree in source_tree_links %}
        <li><a href="{{ tree.href }}">{{ tree.label }}</a></li>
      {% endfor %}
    </ul>
  </fieldset>
</div>
